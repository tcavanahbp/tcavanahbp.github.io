<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blueprint — Projects</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-text:     #3F454A;
      --color-accent:   #3979F9;
      --color-chip-bg:  #CEDEFD;
      --color-banner:   #B4C4E3;
      --color-bg:       #FFFFFF;
      --font-heading:   'Montserrat', 'Arial Black', sans-serif;
      --font-body:      'Lato', 'Arial', sans-serif;
    }

    html { font-size: 16px; }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      font-weight: 400;
      min-height: 100vh;
      padding: 0 24px;
    }

    /* ── App Header ── */
    .app-header {
      background: var(--color-bg);
      border-bottom: 2px solid var(--color-banner);
      padding: 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 760px;
      margin: 0 auto;
      height: 60px;
    }

    .bp-wordmark {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--color-text);
      letter-spacing: -0.01em;
      text-decoration: none;
      position: relative;
      display: inline-block;
    }

    /* dot mark upper-right of "t" */
    .bp-wordmark::after {
      content: '·';
      position: absolute;
      top: -4px;
      right: -6px;
      font-size: 1rem;
      color: var(--color-banner);
      line-height: 1;
    }

    .header-chip {
      background: var(--color-chip-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 999px;
    }

    /* ── Page Header ── */
    header.page-header {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 0 40px;
      border-bottom: 1px solid var(--color-banner);
    }

    .page-title {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .page-title span {
      color: var(--color-accent);
    }

    .page-tagline {
      font-family: var(--font-body);
      font-size: 0.875rem;
      color: var(--color-text);
      opacity: 0.6;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── Controls ── */
    .controls {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .count {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--color-text);
      opacity: 0.5;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .search-wrap input {
      background: var(--color-bg);
      border: 1.5px solid var(--color-banner);
      border-radius: 6px;
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 0.875rem;
      padding: 8px 14px;
      outline: none;
      width: 200px;
      transition: border-color 0.15s;
    }

    .search-wrap input::placeholder { color: var(--color-text); opacity: 0.4; }
    .search-wrap input:focus { border-color: var(--color-accent); }

    /* ── Grid ── */
    .grid {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 0 80px;
    }

    /* ── Card ── */
    .card {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 16px;
      text-decoration: none;
      color: inherit;
      padding: 20px 16px;
      border-radius: 12px;
      border: 1px solid transparent;
      margin-bottom: 6px;
      transition: background 0.12s, border-color 0.12s, box-shadow 0.12s;

      /* animation */
      opacity: 0;
      transform: translateY(6px);
      animation: fadeUp 0.3s forwards;
    }

    .card:hover {
      background: #F5F7FF;
      border-color: var(--color-banner);
      box-shadow: 0 2px 12px rgba(63, 69, 74, 0.08);
    }

    /* Divider line between cards */
    .card + .card {
      border-top: 1px solid #EEF0F4;
    }

    .card-left { min-width: 0; }

    .card-name {
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.01em;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-desc {
      font-family: var(--font-body);
      font-size: 0.875rem;
      color: var(--color-text);
      opacity: 0.65;
      line-height: 1.5;
      max-width: 520px;
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .card-arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--color-chip-bg);
      color: var(--color-accent);
      font-size: 0.9rem;
      transition: background 0.15s, transform 0.15s;
    }

    .card:hover .card-arrow {
      background: var(--color-accent);
      color: #fff;
      transform: translateX(2px);
    }

    .card-date {
      font-family: var(--font-body);
      font-size: 0.72rem;
      color: var(--color-text);
      opacity: 0.45;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .lang-chip {
      font-family: var(--font-body);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--color-chip-bg);
      color: var(--color-text);
      padding: 3px 9px;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* ── States ── */
    .state {
      max-width: 760px;
      margin: 80px auto;
      text-align: center;
      font-family: var(--font-body);
      font-size: 0.875rem;
      color: var(--color-text);
      opacity: 0.5;
      letter-spacing: 0.05em;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--color-banner);
      border-top-color: var(--color-accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 0 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--color-banner);
    }

    .footer-wordmark {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--color-text);
      opacity: 0.5;
    }

    .footer-meta {
      font-family: var(--font-body);
      font-size: 0.72rem;
      color: var(--color-text);
      opacity: 0.4;
      letter-spacing: 0.05em;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- App Header -->
  <div class="app-header">
    <span class="bp-wordmark">blueprint</span>
    <span class="header-chip">Projects</span>
  </div>

  <!-- Page Header -->
  <header class="page-header">
    <h1 class="page-title" id="display-name">Blueprint <span>Equity Stack</span></h1>
    <p class="page-tagline" id="tagline">Projects &amp; Experiments</p>
  </header>

  <!-- Controls -->
  <div class="controls">
    <span class="count" id="count"></span>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Filter repos…" autocomplete="off" spellcheck="false" />
    </div>
  </div>

  <!-- Grid -->
  <main class="grid" id="grid">
    <div class="state">
      <div class="spinner"></div>
      Fetching repos…
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <span class="footer-wordmark">blueprint</span>
    <span class="footer-meta" id="footer-meta"></span>
  </footer>

  <script>
    // ─────────────────────────────────────────────
    // CONFIG
    // ─────────────────────────────────────────────
    const USERNAME     = 'tcavanahbp';
    const DISPLAY_NAME = 'Blueprint Equity Stack';
    const TAGLINE      = 'Projects & Experiments';
    const HIDE_PAGES_REPO = true;
    // ─────────────────────────────────────────────

    let allRepos = [];

    async function fetchAllRepos() {
      let page = 1, repos = [];
      while (true) {
        const res = await fetch(
          `https://api.github.com/users/${USERNAME}/repos?per_page=100&sort=pushed&page=${page}`
        );
        if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
        const data = await res.json();
        repos = repos.concat(data);
        if (data.length < 100) break;
        page++;
      }
      return repos;
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
    }

    function hasPages(repo) {
      return repo.has_pages || repo.name === `${USERNAME}.github.io`;
    }

    function repoURL(repo) {
      if (repo.homepage) return repo.homepage;
      if (hasPages(repo)) return `https://${USERNAME}.github.io/${repo.name}`;
      return repo.html_url;
    }

    function renderCard(repo, index) {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = repoURL(repo);
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.style.animationDelay = `${index * 40}ms`;

      const desc = repo.description || '';
      const lang = repo.language || '';

      a.innerHTML = `
        <div class="card-left">
          <div class="card-name">${repo.name}</div>
          ${desc ? `<div class="card-desc">${desc}</div>` : ''}
        </div>
        <div class="card-meta">
          <div class="card-arrow">→</div>
          <div class="card-date">${formatDate(repo.pushed_at)}</div>
          ${lang ? `<div class="lang-chip">${lang}</div>` : ''}
        </div>
      `;
      return a;
    }

    function render(repos) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      if (repos.length === 0) {
        grid.innerHTML = '<div class="state">No matching repos found.</div>';
        return;
      }

      repos.forEach((r, i) => grid.appendChild(renderCard(r, i)));
    }

    function applyFilter(query) {
      const q = query.toLowerCase().trim();
      const filtered = q
        ? allRepos.filter(r =>
            r.name.toLowerCase().includes(q) ||
            (r.description || '').toLowerCase().includes(q)
          )
        : allRepos;

      document.getElementById('count').textContent =
        filtered.length === allRepos.length
          ? `${allRepos.length} Repos`
          : `${filtered.length} of ${allRepos.length} Repos`;

      render(filtered);
    }

    async function init() {
      document.getElementById('tagline').textContent = TAGLINE;

      try {
        const userRes = await fetch(`https://api.github.com/users/${USERNAME}`);
        const user = await userRes.json();

        const name = DISPLAY_NAME || user.name || USERNAME;
        const words = name.trim().split(' ');
        const last = words.pop();
        const rest = words.join(' ');
        document.getElementById('display-name').innerHTML =
          rest ? `${rest} <span>${last}</span>` : `<span>${name}</span>`;

        if (!TAGLINE && user.bio) {
          document.getElementById('tagline').textContent = user.bio;
        }

        let repos = await fetchAllRepos();

        if (HIDE_PAGES_REPO) {
          repos = repos.filter(r => r.name !== `${USERNAME}.github.io`);
        }

        repos.sort((a, b) => {
          const ap = hasPages(a) ? 1 : 0;
          const bp = hasPages(b) ? 1 : 0;
          if (ap !== bp) return bp - ap;
          return new Date(b.pushed_at) - new Date(a.pushed_at);
        });

        allRepos = repos;

        document.getElementById('count').textContent = `${repos.length} Repos`;
        document.getElementById('footer-meta').textContent =
          `Updated via GitHub API · ${new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}`;

        render(repos);

      } catch (err) {
        document.getElementById('grid').innerHTML =
          `<div class="state">Couldn't load repos — check the username in config.<br><br>${err.message}</div>`;
      }
    }

    document.getElementById('search').addEventListener('input', e => {
      applyFilter(e.target.value);
    });

    init();
  </script>

</body>
</html>
